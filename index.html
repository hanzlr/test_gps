<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="icon" href="assets/logo.png" type="image/png" />
    <link rel="manifest" href="manifest.json" />

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GPS TRACKER</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- LEAFLET -->

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- FONT AWESOME -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- CSS -->

    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <!-- TITLE -->

        <div class="mb-4">

            <div class="title">
                GPS TRACKER
            </div>

            <div class="subtitle">
                LIVE TRACKING DASHBOARD
            </div>

        </div>

        <!-- CONTROL -->

        <div class="row g-2 mb-3">

            <!-- RELAY -->

            <div class="col-6">

                <button id="relayBtn" class="btn btn-danger custom-btn w-100" onclick="toggleRelay()">

                    <i class="fa-solid fa-power-off"></i>

                    <span>RELAY</span>

                </button>

            </div>

            <!-- BUZZER -->

            <div class="col-6">

                <button id="buzzerBtn" class="btn btn-danger custom-btn w-100" onclick="toggleBuzzer()">

                    <i class="fa-solid fa-volume-high"></i>

                    <span>BUZZER</span>

                </button>

            </div>

            <!-- GEOFENCE -->

            <div class="col-6">

                <button id="geoBtn" class="btn btn-danger custom-btn w-100" onclick="toggleGeo()">

                    <i class="fa-solid fa-shield-halved"></i>

                    <span>GEOFENCE</span>

                </button>

            </div>

            <!-- TRACKING -->

            <div class="col-6">

                <button class="btn btn-primary custom-btn w-100" onclick="tracking()">

                    <i class="fa-solid fa-location-crosshairs"></i>

                    <span>TRACKING</span>

                </button>

            </div>

        </div>

        <!-- STATUS -->

        <div class="card status-card">

            <div class="status-title">
                STATUS
            </div>

            <div class="status-item">
                <span>Latitude</span>
                <span id="latText">-</span>
            </div>

            <div class="status-item">
                <span>Longitude</span>
                <span id="lonText">-</span>
            </div>

            <div class="status-item">
                <span>Signal</span>
                <span id="signalText">-</span>
            </div>

            <div class="status-item">
                <span>Internet</span>
                <span id="internetText">-</span>
            </div>

            <div class="status-item">
                <span>Geofence</span>
                <span id="geoText">-</span>
            </div>

            <div class="status-item">
                <span>GPS</span>
                <span id="gpsText">-</span>
            </div>

        </div>

        <!-- GOOGLE MAPS -->

        <a id="mapsLink" href="#" target="_blank">

            <i class="fa-brands fa-google"></i>

            OPEN GOOGLE MAPS

        </a>

    </div>

    <!-- MAP -->

    <div id="map"></div>

    <!-- MAP BUTTON -->

    <button class="map-btn" onclick="toggleFullscreen()">

        <i class="fa-solid fa-expand"></i>

        MAP MODE

    </button>

    <!-- LEAFLET -->

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
